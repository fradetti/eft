<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emirates Flight Tracker</title>
<style>
  :root {
    --red: #D71921;
    --gold: #C8A951;
    --dark: #1a1a1a;
    --bg: #f5f5f5;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--dark);
  }

  header {
    background: var(--red);
    color: var(--white);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
  }

  header span.subtitle {
    color: var(--gold);
    font-size: 0.9rem;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  /* Stats cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--white);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid var(--gold);
  }

  .stat-card .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-top: 0.25rem; }

  /* Filters */
  .filters {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    align-items: end;
  }

  .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
  .filter-group label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-group select,
  .filter-group input {
    padding: 0.45rem 0.6rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.9rem;
    background: var(--white);
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    background: var(--white);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  thead { background: var(--dark); color: var(--white); }
  th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; white-space: nowrap; }
  td { padding: 0.6rem 1rem; border-bottom: 1px solid #eee; white-space: nowrap; }
  tbody tr:hover { background: #fafafa; }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--white);
  }

  .badge-green  { background: #2e7d32; }
  .badge-yellow { background: #f9a825; color: var(--dark); }
  .badge-red    { background: #c62828; }
  .badge-grey   { background: #757575; }

  .delay-cell { font-weight: 600; }
  .delay-green  { color: #2e7d32; }
  .delay-yellow { color: #f9a825; }
  .delay-red    { color: #c62828; }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: #999;
  }

  /* Per-flight stats */
  .flight-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .flight-stat-card {
    background: var(--white);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-top: 3px solid var(--red);
  }

  .flight-stat-card h3 { font-size: 1rem; margin-bottom: 0.5rem; color: var(--red); }
  .flight-stat-card .stat-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.2rem 0; }
  .flight-stat-card .stat-row .val { font-weight: 600; }

  @media (max-width: 600px) {
    header { flex-direction: column; text-align: center; }
    .filters { flex-direction: column; }
    th, td { padding: 0.5rem 0.6rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Emirates Flight Tracker</h1>
    <span class="subtitle">EK78 / EK705 / EK708 / EK77 — Daily status</span>
  </div>
</header>

<div class="container">
  <div class="stats" id="globalStats"></div>

  <div class="flight-stats" id="flightStats"></div>

  <div class="filters">
    <div class="filter-group">
      <label>Flight</label>
      <select id="filterFlight">
        <option value="">All flights</option>
        <option value="EK78">EK78</option>
        <option value="EK705">EK705</option>
        <option value="EK708">EK708</option>
        <option value="EK77">EK77</option>
      </select>
    </div>
    <div class="filter-group">
      <label>From</label>
      <input type="date" id="filterFrom">
    </div>
    <div class="filter-group">
      <label>To</label>
      <input type="date" id="filterTo">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Flight</th>
          <th>Route</th>
          <th>Scheduled</th>
          <th>Actual</th>
          <th>Delay</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="empty-state">Loading data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let allData = [];

async function loadData() {
  try {
    const resp = await fetch('data/flights.json');
    allData = await resp.json();
  } catch (e) {
    allData = [];
  }
  renderStats();
  renderTable();
}

function getDelayClass(minutes) {
  if (minutes === null || minutes === undefined) return '';
  if (minutes < 15) return 'green';
  if (minutes <= 45) return 'yellow';
  return 'red';
}

function formatTime(isoStr) {
  if (!isoStr) return '—';
  // Handle "YYYY-MM-DD HH:MMLocal" format from AeroDataBox
  const match = isoStr.match(/(\d{2}:\d{2})/);
  return match ? match[1] : isoStr;
}

function getFilteredData() {
  const flight = document.getElementById('filterFlight').value;
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;

  return allData.filter(r => {
    if (flight && r.flight !== flight) return false;
    if (from && r.date < from) return false;
    if (to && r.date > to) return false;
    return true;
  });
}

function renderStats() {
  const data = allData.filter(r => r.delay_minutes !== null && r.delay_minutes !== undefined);
  const total = data.length;
  const onTime = data.filter(r => r.delay_minutes < 15).length;
  const avgDelay = total ? (data.reduce((s, r) => s + r.delay_minutes, 0) / total).toFixed(0) : '—';
  const onTimePct = total ? ((onTime / total) * 100).toFixed(0) : '—';
  const cancelled = allData.filter(r => r.status && r.status.toLowerCase().includes('cancel')).length;

  document.getElementById('globalStats').innerHTML = `
    <div class="stat-card"><div class="label">Total flights tracked</div><div class="value">${allData.length}</div></div>
    <div class="stat-card"><div class="label">On-time rate (&lt;15min)</div><div class="value">${onTimePct}%</div></div>
    <div class="stat-card"><div class="label">Avg delay</div><div class="value">${avgDelay} min</div></div>
    <div class="stat-card"><div class="label">Cancelled</div><div class="value">${cancelled}</div></div>
  `;

  // Per-flight stats
  const flights = ['EK78', 'EK705', 'EK708', 'EK77'];
  let flightHtml = '';
  for (const fn of flights) {
    const fd = data.filter(r => r.flight === fn);
    const ft = fd.length;
    const fOnTime = fd.filter(r => r.delay_minutes < 15).length;
    const fAvg = ft ? (fd.reduce((s, r) => s + r.delay_minutes, 0) / ft).toFixed(0) : '—';
    const fMax = ft ? Math.max(...fd.map(r => r.delay_minutes)) : '—';
    const fPct = ft ? ((fOnTime / ft) * 100).toFixed(0) : '—';
    const route = allData.find(r => r.flight === fn);
    const routeStr = route ? `${route.origin} → ${route.destination}` : '';

    flightHtml += `
      <div class="flight-stat-card">
        <h3>${fn} <span style="font-weight:400;font-size:0.85rem;color:#666">${routeStr}</span></h3>
        <div class="stat-row"><span>Flights tracked</span><span class="val">${ft}</span></div>
        <div class="stat-row"><span>On-time rate</span><span class="val">${fPct}%</span></div>
        <div class="stat-row"><span>Avg delay</span><span class="val">${fAvg} min</span></div>
        <div class="stat-row"><span>Max delay</span><span class="val">${fMax} min</span></div>
      </div>
    `;
  }
  document.getElementById('flightStats').innerHTML = flightHtml;
}

function renderTable() {
  const data = getFilteredData();
  const tbody = document.getElementById('tableBody');

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No flight data yet. Data will appear after the first fetch.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(r => {
    const dc = getDelayClass(r.delay_minutes);
    const isCancelled = r.status && r.status.toLowerCase().includes('cancel');

    let statusBadge;
    if (isCancelled) {
      statusBadge = `<span class="badge badge-grey">Cancelled</span>`;
    } else if (dc === 'green') {
      statusBadge = `<span class="badge badge-green">${r.status}</span>`;
    } else if (dc === 'yellow') {
      statusBadge = `<span class="badge badge-yellow">${r.status}</span>`;
    } else if (dc === 'red') {
      statusBadge = `<span class="badge badge-red">${r.status}</span>`;
    } else {
      statusBadge = `<span class="badge badge-grey">${r.status || 'Unknown'}</span>`;
    }

    const delayStr = r.delay_minutes !== null && r.delay_minutes !== undefined
      ? `${r.delay_minutes >= 0 ? '+' : ''}${r.delay_minutes} min`
      : '—';

    return `<tr>
      <td>${r.date}</td>
      <td><strong>${r.flight}</strong></td>
      <td>${r.origin || ''} → ${r.destination || ''}</td>
      <td>${formatTime(r.scheduled_departure)}</td>
      <td>${formatTime(r.actual_departure)}</td>
      <td class="delay-cell delay-${dc}">${delayStr}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

document.getElementById('filterFlight').addEventListener('change', renderTable);
document.getElementById('filterFrom').addEventListener('change', renderTable);
document.getElementById('filterTo').addEventListener('change', renderTable);

loadData();
</script>
</body>
</html>
